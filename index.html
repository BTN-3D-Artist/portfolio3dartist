<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Các thẻ meta cung cấp thông tin về trang web, không hiển thị trực tiếp trên trang -->
    <!-- Đặt bộ ký tự của trang web là UTF-8 
    (hiển thị gần như tất cả các ngôn ngữ trên thế giới, bao gồm cả tiếng Việt) -->
    <meta charset="UTF-8">
    <!-- Đặt viewport để trang web hiển thị tốt trên các thiết bị di động -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Đặt tên tác giả của trang web -->
    <meta name="author" content="Ba Tuong Nguyen">
    <!-- Đặt mô tả ngắn gọn về trang web -->
    <meta name="description" content="Portfolio Website of Ba Tuong Nguyen, a 3D artist">
    <!-- Đặt các từ khóa liên quan đến trang web để cải thiện SEO -->
    <meta name="keywords" content="3D artist, portfolio, Ba Tuong Nguyen">

    <!-- Tiêu đề hiển thị trên tab trình duyệt -->
    <title>BTN - 3D Artist</title>

    <!-- Thẻ link được dùng để kết nối các tài nguyên bên ngoài như CSS, JS, favicon, font chữ, v.v.-->
    <!-- Đặt biểu tượng favicon cho trang web -->
    <link rel="icon" href="./img/Symbol Logo.png" type="image/x-icon" sizes="32x32">
    <!-- Liên kết đến tệp CSS bên ngoài để định dạng trang web -->
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <h1>Welcome to BTN's Portfolio</h1>
</body>

</html>

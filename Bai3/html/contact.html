<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="The Little Taco Shop">
    <meta name="description" content="Contact The Little Taco Shop">
    <meta name="keywords" content="tacos, food, restaurant, contact">
    <title>The Little Taco Shop</title>
    <link rel="icon" href="../favicon.ico" type="image/x-icon">
    <link href="../css/style.css" rel="stylesheet">
</head>

<body>
    <header id="top">
        <h1>Contact Us</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#about">About LTS</a></li>
                <li><a href="index.html#menu">Our Menu</a></li>
                <li><a href="hour.html">Store Hours</a></li>
            </ul>
        </nav>
        <figure>
            <img src="../img/tacos_close_up_400x260.png" alt="Single Taco" width="400" height="267" loading="lazy">
            <figcaption>Little Taco Shop Tacos</figcaption>
        </figure>
    </header>
    <hr>
    <main>
        <article>
            <section>
                <h2>Our Contact Form</h2>
                <form action="https://example.com/submit_form" method="post">
                    <fieldset>
                        <legend>Send Us a Message</legend>
                        <div>
                            <label for="name">Name:</label><br>
                            <input type="text" id="name" name="name" placeholder="your name" required><br><br>
                        </div>
                        <div>
                            <label for="email">Email:</label><br>
                            <input type="email" id="email" name="email" placeholder="your email" required><br><br>
                        </div>
                        <div>
                            <label for="message">Message:</label><br>
                            <textarea id="message" name="message" rows="4" cols="50"
                                placeholder="Type your message here" required></textarea><br><br>
                        </div>
                    </fieldset>
                    <button type="submit">Send</button>
                    <button type="reset">Reset</button>
                </form>
            </section>
            <section>
                <h2>Our Location</h2>
                <address>
                    555 Taco Temptation Lane.Suite T<br>
                    Kansas City: MO 55555-5555<br><br>
                    Phone: <a href="tel:5555555555">555-555-5555</a>
                </address>
            </section>
        </article>
        <br>
        <a href="#top">Back to Top</a>
    </main>
    <hr>
    <footer>
        <p>Copyright &copy; The Little Taco Shop</p>
    </footer>
</body>

</html>
